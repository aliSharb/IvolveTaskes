---
- name: Install Java (JDK 17)
  apt:
    name: openjdk-17-jdk
    state: present
    update_cache: yes
  become: yes

- name: Add Jenkins GPG Key
  get_url:
    url: https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key
    dest: /usr/share/keyrings/jenkins-keyring.asc
    mode: '0644'
  become: yes

- name: Add Jenkins Repository
  shell: echo "deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/" > /etc/apt/sources.list.d/jenkins.list
  become: yes

- name: Install Jenkins
  apt:
    name: jenkins
    state: present
    update_cache: yes
  become: yes

- name: Start and enable Jenkins
  systemd:
    name: jenkins
    enabled: yes
    state: started
  become: yes

- name: Open port 8080 in UFW
  command: ufw allow 8080/tcp
  ignore_errors: yes
  become: yes

- name: Reload UFW to apply changes
  command: ufw reload
  ignore_errors: yes
  become: yes
